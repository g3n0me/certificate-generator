<style>

:root{
--green:#2e5d3a;
--dark:#1a3c26;
--gold:#c9a96e;
--cream:#fdfaf3;
--border:#e0e0d8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(-45deg,#fdfaf3,#f0ede5,#e8e2d3,#fdfaf3);
background-size:400% 400%;
animation:bgmove 16s ease infinite;
padding:20px;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.container{
max-width:1000px;
margin:auto;
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

header{
background:linear-gradient(135deg,var(--green),var(--dark));
color:white;
padding:40px;
text-align:center;
}

h1{
font-family:'Allura',cursive;
font-size:56px;
color:var(--gold);
}

.content{
padding:40px;
text-align:center;
}

.timer-box{
background:linear-gradient(135deg,var(--green),var(--dark));
padding:20px;
border-radius:12px;
color:white;
margin-bottom:30px;
}

.timer-title{
font-weight:600;
margin-bottom:6px;
}

.timer{
font-size:26px;
font-weight:700;
color:#ffd67a;
}

input{
padding:14px;
font-size:18px;
width:100%;
max-width:420px;
border-radius:10px;
border:2px solid var(--border);
text-align:center;
margin-top:10px;
}

.buttons{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px 20px;
font-weight:600;
border:none;
border-radius:8px;
cursor:pointer;
}

#generateBtn{background:var(--green);color:white;}
#downloadPdf{background:var(--gold);color:white;}
#downloadJpg{background:#555;color:white;}

button:disabled{
opacity:0.4;
cursor:not-allowed;
}

canvas{
margin-top:30px;
border:1px solid #ddd;
border-radius:6px;
max-width:100%;
}

footer{
background:var(--dark);
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
visibility:hidden;
opacity:0;
transition:0.25s;
}

.popup.active{
visibility:visible;
opacity:1;
}

.popup-box{
background:white;
padding:25px;
border-radius:12px;
text-align:center;
max-width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.popup-box h3{
color:#c0392b;
margin-bottom:10px;
}

.popup-box button{
margin-top:10px;
background:var(--green);
color:white;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>Excellence Ayurveda</h1>
<p>Ancient Wisdom • Modern Learning</p>
</header>

<div class="content">

<div class="timer-box">
<div class="timer-title">⏳ Hurry Up — Last Chance to Download Your Certificate</div>
<div id="countdown" class="timer"></div>
</div>

<label>Verify Your Enrollment</label><br>

<input id="nameInput" placeholder="Enter Full Name">

<div class="buttons">
<button id="generateBtn">Generate Certificate</button>
<button id="downloadPdf" disabled>PDF</button>
<button id="downloadJpg" disabled>JPG</button>
</div>

<canvas id="canvas" width="1400" height="1050"></canvas>

<p id="status">Ready for verification 🌿</p>

</div>
</div>

<footer>
© <span id="year"></span> Excellence Ayurveda Academy
</footer>

<div id="popup" class="popup">
<div class="popup-box">
<h3 id="popupTitle"></h3>
<p id="popupMessage"></p>
<button onclick="closePopup()">OK</button>
</div>
</div>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const pdfBtn=document.getElementById("downloadPdf")
const jpgBtn=document.getElementById("downloadJpg")
const generateBtn=document.getElementById("generateBtn")
const input=document.getElementById("nameInput")
const status=document.getElementById("status")

let verifiedStudent=null

const bg=new Image()
bg.src="template.png"

bg.onload=()=>{
ctx.drawImage(bg,0,0,canvas.width,canvas.height)
}

function normalize(name){
return name.toLowerCase().replace(/\s+/g," ").trim()
}

function generateCertificate(){

const user=input.value.trim()

const match=studentList.find(n=>normalize(n)===normalize(user))

if(!match){

verifiedStudent=null
resetCanvas()

showPopup(
"User Not Found",
"Make sure you are registered. Only registered students can generate certificates."
"Make sure the spellings are correct & also include any prefix[if any] used at time of registration."
)

status.textContent="User Not Found"

return
}

verifiedStudent=match
drawCertificate(match)

}

function drawCertificate(name){

ctx.drawImage(bg,0,0,canvas.width,canvas.height)

let size=92

ctx.fillStyle="#1a0d4a"
ctx.textAlign="center"
ctx.textBaseline="middle"

ctx.font=size+"px Allura"

while(ctx.measureText(name).width>1000){
size-=2
ctx.font=size+"px Allura"
}

ctx.fillText(name,canvas.width/2,480)

pdfBtn.disabled=false
jpgBtn.disabled=false

status.textContent="Certificate ready for "+name

}

function resetCanvas(){
ctx.drawImage(bg,0,0,canvas.width,canvas.height)
pdfBtn.disabled=true
jpgBtn.disabled=true
}

function downloadImage(){

if(!verifiedStudent){
showPopup("Verification Required","Verify enrollment first.")
return
}

const link=document.createElement("a")
link.download="Certificate_"+verifiedStudent+".jpg"
link.href=canvas.toDataURL("image/jpeg",0.92)
link.click()

}

async function downloadPdf(){

if(!verifiedStudent){
showPopup("Verification Required","Verify enrollment first.")
return
}

const {jsPDF}=window.jspdf

const pdf=new jsPDF({
orientation:"landscape",
unit:"px",
format:[1400,1050]
})

pdf.addImage(canvas.toDataURL("image/png"),"PNG",0,0,1400,1050)
pdf.save("Certificate_"+verifiedStudent+".pdf")

}

function showPopup(title,msg){

document.getElementById("popupTitle").textContent=title
document.getElementById("popupMessage").textContent=msg
document.getElementById("popup").classList.add("active")

}

function closePopup(){
document.getElementById("popup").classList.remove("active")
}

generateBtn.onclick=generateCertificate
jpgBtn.onclick=downloadImage
pdfBtn.onclick=downloadPdf

input.addEventListener("keypress",e=>{
if(e.key==="Enter")generateCertificate()
})

input.addEventListener("input",()=>{
verifiedStudent=null
pdfBtn.disabled=true
jpgBtn.disabled=true
})

const deadline=new Date("2026-03-11T00:00:00").getTime()
const countdown=document.getElementById("countdown")

function updateTimer(){

const now=new Date().getTime()
const diff=deadline-now

if(diff<=0){

countdown.textContent="Certificate window closed"

generateBtn.disabled=true
pdfBtn.disabled=true
jpgBtn.disabled=true

return
}

const d=Math.floor(diff/(1000*60*60*24))
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60))
const m=Math.floor((diff%(1000*60*60))/(1000*60))
const s=Math.floor((diff%(1000*60))/1000)

countdown.textContent=`${d}d ${h}h ${m}m ${s}s`

}

setInterval(updateTimer,1000)
updateTimer()

</script>

</body>
</html>
